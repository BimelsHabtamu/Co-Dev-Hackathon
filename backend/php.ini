; OPcache settings — drop this file next to your php.ini or reference it
; via php -c php.ini when running artisan / php-fpm

[opcache]
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.revalidate_freq=0        ; 0 = never recheck in production
opcache.validate_timestamps=0    ; disable in production, enable in dev
opcache.save_comments=1          ; required by Laravel annotations
opcache.fast_shutdown=1

; Increase memory limit for Filament / Excel exports
memory_limit=256M
max_execution_time=60
