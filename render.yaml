services:
  - type: web
    name: qelem-pos-backend
    runtime: php
    region: oregon
    plan: free

    rootDir: backend

    buildCommand: bash deploy.sh

    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT

    # Persistent disk so SQLite survives redeploys
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      - key: APP_NAME
        value: "Qelem POS"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true          # Render auto-generates a secure value
      - key: APP_URL
        fromService:
          type: web
          name: qelem-pos-backend
          property: host
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: MAIL_MAILER
        value: log
      - key: FRONTEND_URL
        value: https://your-app.vercel.app   # ← update after Vercel deploy
      - key: SANCTUM_STATEFUL_DOMAINS
        value: your-app.vercel.app           # ← update after Vercel deploy
