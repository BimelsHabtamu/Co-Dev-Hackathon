services:
  - type: web
    name: qelem-pos-backend
    runtime: docker
    region: oregon
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile

    envVars:
      - key: APP_NAME
        value: "Qelem POS"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://co-dev-hackathon.onrender.com
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/database/database.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: MAIL_MAILER
        value: log
      - key: FRONTEND_URL
        value: https://your-app.vercel.app
      - key: SANCTUM_STATEFUL_DOMAINS
        value: your-app.vercel.app
